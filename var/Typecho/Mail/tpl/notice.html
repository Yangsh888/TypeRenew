<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{subject}</title>
</head>
<body style="margin:0;padding:0;background:#f6f6f3;color:#222;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif;">
<div style="max-width:640px;margin:0 auto;padding:24px;">
    <div style="background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:12px;overflow:hidden;">
        <div style="padding:18px 20px;border-bottom:1px solid rgba(0,0,0,.06);">
            <div style="font-size:14px;color:#666;">{siteTitle}</div>
            <div style="font-size:18px;font-weight:600;line-height:1.3;margin-top:6px;">有一条评论待审核</div>
        </div>
        <div style="padding:18px 20px;">
            <div style="font-size:14px;color:#666;margin-bottom:6px;">文章：{title}</div>
            <div style="font-size:14px;color:#666;margin-bottom:12px;">评论者：{author}（{mail}）</div>
            <div style="background:#fff3cd;border:1px solid rgba(0,0,0,.06);border-radius:10px;padding:14px 14px;font-size:14px;line-height:1.65;word-break:break-word;">{commentTextPlain}</div>
            <div style="margin-top:16px;font-size:13px;color:#666;">
                <div>时间：{time}</div>
                <div>IP：{ip}</div>
                <div>状态：{status}</div>
            </div>
            <div style="margin-top:18px;">
                <a href="{manageurl}" style="display:inline-block;padding:10px 14px;border-radius:10px;background:#111;color:#fff;text-decoration:none;font-size:14px;">去后台审核</a>
            </div>
            <div style="margin-top:12px;font-size:12px;color:#777;">
                <a href="{unsubUrl}" style="color:#666;text-decoration:none;">退订待审提醒</a>
            </div>
        </div>
        <div style="padding:14px 20px;border-top:1px solid rgba(0,0,0,.06);font-size:12px;color:#777;">
            <a href="{siteUrl}" style="color:#555;text-decoration:none;">{siteUrl}</a>
        </div>
    </div>
</div>
</body>
</html>
